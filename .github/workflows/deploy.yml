name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/website-conversion-2j7za0
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages via the API on first run so no manual settings step is needed.
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo is the site — index.html is fully self-contained.
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
